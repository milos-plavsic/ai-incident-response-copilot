<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"/><title>Incident Copilot</title></head>
<body style="font-family:system-ui;max-width:800px;margin:2rem auto">
<h1>AI Incident Response Copilot</h1>
<textarea id="inc" rows="6" style="width:100%">API latency spike after deploy; database connection pool exhausted</textarea>
<button id="go">Analyze</button>
<pre id="out"></pre>
<script>
const b=location.origin.replace(/\/ui\/?$/,'');
document.getElementById('go').onclick=async()=>{
  const body={incident:document.getElementById('inc').value,alerts:[],events:[]};
  const r=await fetch(b+'/v1/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2);
};
</script>
</body>
</html>
